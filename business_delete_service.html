{% extends 'base.html' %}

{% block title %}Delete Service - Business Dashboard{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom fade-in">
    <h1 class="h2">Delete Service</h1>
</div>

<div class="row slide-up">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-body">
                <p>Are you sure you want to delete the service "<strong>{{ service.name }}</strong>"?</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger me-2">Delete</button>
                    <a href="{% url 'manage_services' %}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
